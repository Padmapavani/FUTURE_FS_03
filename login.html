<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HealthHub | Login</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="navbar">
    <div class="logo">
      <div class="logo-mark">H</div>
      <div>
        <h1>HealthHub</h1>
        <p>Wellness made simple</p>
      </div>
    </div>
    <button class="menu-toggle" onclick="toggleMenu()">☰</button>
    <nav id="navLinks" class="nav-links">
      <a href="index.html">Home</a>
      <a href="about.html">About</a>
      <a href="services.html">Services</a>
      <a href="contact.html">Contact</a>
      <a href="login.html" class="active btn-nav">Login</a>
    </nav>
  </header>

  <main class="login-page">
    <section class="login-wrapper">
      <!-- <div class="login-image">
        <img
          src="https://images.unsplash.com/photo-1580281658629-5e90f6f6b1d0?auto=format&fit=crop&w=900&q=80"
          alt="Medical health concept"
        />
      </div> -->
      <div class="login-image">
  <img
    src="https://placehold.co/900x700/eaf4ff/1f7ae0/png?text=Health+Hub"
    alt="HealthHub visual"
    onerror="this.onerror=null;this.src='https://placehold.co/900x700/f3f9ff/1b6ac9/png?text=Health+Hub';"
  />
</div>

      <div class="content-box login-box">
        <span class="tag">Welcome Back</span>
        <h2>Login to HealthHub</h2>
        <form onsubmit="loginUser(event)">
          <input type="text" placeholder="Username" required />
          <input type="password" placeholder="Password" required />
          <button type="submit" class="btn primary">Login</button>
        </form>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
